name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # Enable manual trigger

permissions:
  contents: write

jobs:
  build-release:
    name: Build and Release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: linux, goarch: 386 }
          - { goos: linux, goarch: arm, goarm: 7 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
          - { goos: windows, goarch: 386 }

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch all tags

      - name: Determine Version
        id: get_version
        run: |
          # If triggered by a tag push, use that tag.
          # Otherwise, fetch the latest tag from the repo.
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            VERSION=${{ github.ref_name }}
          else
            VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0-manual")
          fi
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Detected version: $VERSION"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"

      - name: Build Binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          BINARY_NAME=yoink
          if [ "${{ matrix.goos }}" = "windows" ]; then
            BINARY_NAME=yoink.exe
          fi

          # Use the environment variable we set in the 'Determine Version' step
          ARTIFACT_NAME=yoink-${{ env.RELEASE_VERSION }}-${{ matrix.goos }}-${{ matrix.goarch }}

          if [ "${{ matrix.goarch }}" = "arm" ]; then
            ARTIFACT_NAME="${ARTIFACT_NAME}v${{ matrix.goarm }}"
          fi

          echo "Building $ARTIFACT_NAME..."
          mkdir -p dist
          go build -v -o "dist/${BINARY_NAME}" .

          cd dist
          if [ "${{ matrix.goos }}" = "windows" ]; then
            zip "../${ARTIFACT_NAME}.zip" "${BINARY_NAME}"
          else
            tar -czvf "../${ARTIFACT_NAME}.tar.gz" "${BINARY_NAME}"
          fi

      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          files: |
            yoink-*.tar.gz
            yoink-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
